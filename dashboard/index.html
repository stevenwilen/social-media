<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Veronica Wilen · Social Content Board</title>
<style>
  :root {
    --navy: #1b2a4a;
    --navy-2: #2b3d63;
    --gold: #c6a15b;
    --gold-dark: #a8853f;
    --cream: #f7f4ef;
    --paper: #ffffff;
    --ink: #23262e;
    --muted: #6b7280;
    --line: #e7e2d8;
    --shadow: 0 1px 3px rgba(27,42,74,.08), 0 8px 24px rgba(27,42,74,.06);

    --pillar-listings: #c6a15b;
    --pillar-market-update: #2e4a7d;
    --pillar-development: #2f8f83;
    --pillar-community: #c86b5c;
    --pillar-lifestyle: #6b8e5a;
    --pillar-video: #7b5ea7;

    --status-scheduled: #2f8f6a;
    --status-proposed: #2e4a7d;
    --status-needs-input: #c9822a;
    --status-posted: #6b7280;
    --status-draft: #8a8f98;

    --approve: #2f8f6a;
    --change: #c9822a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--cream);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3, .serif { font-family: Georgia, "Iowan Old Style", "Times New Roman", serif; }
  a { color: var(--navy-2); }

  header.app {
    background: var(--navy);
    color: #fff;
    padding: 22px 20px 18px;
    border-bottom: 3px solid var(--gold);
  }
  .wrap { max-width: 1080px; margin: 0 auto; }
  header.app .brand { font-size: 1.5rem; letter-spacing: .3px; }
  header.app .brand b { color: var(--gold); font-weight: 600; }
  header.app .tagline { color: #c9d2e2; font-style: italic; font-size: .92rem; margin-top: 2px; }
  header.app .meta { color: #aab6cc; font-size: .8rem; margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px 16px; align-items:center; }
  header.app .meta span b { color: #e7ecf5; font-weight: 600; }
  header.app .review-count { background: var(--gold); color: #2a2000; font-weight: 700; padding: 2px 10px; border-radius: 999px; font-size: .76rem; }

  main { max-width: 1080px; margin: 0 auto; padding: 20px; }

  .sample-note {
    background: #fff8e8; border: 1px solid #ecd9a6; color: #7a5f1f;
    border-radius: 10px; padding: 10px 14px; font-size: .85rem; margin-bottom: 18px;
  }

  .needs {
    background: var(--paper); border: 1px solid var(--line); border-left: 5px solid var(--status-needs-input);
    border-radius: 12px; padding: 16px 18px; margin-bottom: 20px; box-shadow: var(--shadow);
  }
  .needs h2 { margin: 0 0 4px; font-size: 1.05rem; color: var(--navy); display: flex; align-items: center; gap: 8px; }
  .needs .sub { color: var(--muted); font-size: .85rem; margin-bottom: 12px; }
  .needs ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
  .needs li { display: flex; gap: 12px; align-items: flex-start; padding: 10px 12px; background: #fbf9f4; border: 1px solid var(--line); border-radius: 9px; }
  .needs li .when { flex: 0 0 auto; font-weight: 600; color: var(--navy); font-size: .82rem; min-width: 92px; }
  .needs li .what { font-size: .88rem; }
  .needs .allclear { color: var(--status-scheduled); font-size: .9rem; }

  .controls { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .toggle { display: inline-flex; background: #fff; border: 1px solid var(--line); border-radius: 999px; padding: 3px; box-shadow: var(--shadow); }
  .toggle button {
    border: 0; background: transparent; padding: 7px 16px; border-radius: 999px; cursor: pointer;
    font-size: .88rem; color: var(--muted); font-weight: 600;
  }
  .toggle button.active { background: var(--navy); color: #fff; }
  .legend { display: flex; flex-wrap: wrap; gap: 6px 12px; font-size: .76rem; color: var(--muted); }
  .legend .dot { display: inline-block; width: 9px; height: 9px; border-radius: 3px; margin-right: 5px; vertical-align: middle; }

  .cal-month { margin-bottom: 22px; }
  .cal-month h3 { color: var(--navy); font-size: 1.1rem; margin: 0 0 10px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-grid .dow { text-align: center; font-size: .72rem; color: var(--muted); font-weight: 600; padding-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
  .cal-cell { background: var(--paper); border: 1px solid var(--line); border-radius: 8px; min-height: 78px; padding: 6px; }
  .cal-cell.empty { background: transparent; border: 0; }
  .cal-cell .num { font-size: .74rem; color: var(--muted); font-weight: 600; }
  .cal-cell.today .num { color: var(--gold-dark); }
  .chip {
    display: block; width: 100%; text-align: left; border: 0; cursor: pointer; margin-top: 4px;
    border-radius: 6px; padding: 4px 6px; font-size: .72rem; color: #fff; line-height: 1.25;
    border-left: 3px solid rgba(255,255,255,.55); position: relative;
  }
  .chip .plat { font-size: .64rem; opacity: .9; display: block; letter-spacing: .3px; text-transform: uppercase; }
  .chip .rev-tick { position: absolute; top: 3px; right: 4px; font-size: .7rem; }

  .list { display: grid; gap: 12px; }
  .card {
    background: var(--paper); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px;
    box-shadow: var(--shadow); cursor: pointer; display: grid; grid-template-columns: 96px 1fr auto; gap: 14px; align-items: start;
  }
  .card:hover { border-color: var(--gold); }
  .card .date { text-align: center; }
  .card .date .d { font-size: 1.5rem; font-weight: 700; color: var(--navy); font-family: Georgia, serif; line-height: 1; }
  .card .date .m { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .card .date .t { font-size: .68rem; color: var(--muted); margin-top: 3px; }
  .card .body .hook { font-weight: 600; font-size: 1rem; color: var(--ink); margin: 2px 0 6px; }
  .card .body .tags { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .card .body .media-note { color: var(--muted); font-size: .78rem; margin-top: 8px; }
  .card-right { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .pill { font-size: .7rem; font-weight: 600; padding: 3px 9px; border-radius: 999px; color: #fff; }
  .platicons { display: flex; gap: 4px; }
  .platicon { font-size: .66rem; font-weight: 700; color: #fff; width: 20px; height: 20px; border-radius: 5px; display: grid; place-items: center; }
  .fb { background: #1877f2; } .ig { background: #d6249f; } .yt { background: #ff0000; }
  .status { font-size: .7rem; font-weight: 700; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }

  .overlay { position: fixed; inset: 0; background: rgba(27,42,74,.5); display: none; align-items: flex-start; justify-content: center; padding: 24px; overflow-y: auto; z-index: 50; }
  .overlay.open { display: flex; }
  .modal { background: var(--paper); border-radius: 14px; max-width: 640px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,.3); overflow: hidden; }
  .modal .m-head { background: var(--navy); color: #fff; padding: 18px 20px; }
  .modal .m-head .row { display: flex; justify-content: space-between; align-items: start; gap: 12px; }
  .modal .m-head h3 { margin: 6px 0 0; font-size: 1.2rem; }
  .modal .m-head .close { background: rgba(255,255,255,.15); border: 0; color: #fff; font-size: 1.1rem; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; flex: 0 0 auto; }
  .modal .m-body { padding: 20px; }
  .modal .m-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; align-items: center; }
  .cap-block { border: 1px solid var(--line); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
  .cap-block .cap-head { padding: 8px 12px; font-size: .76rem; font-weight: 700; letter-spacing: .3px; text-transform: uppercase; color: #fff; }
  .cap-block .cap-text { padding: 12px; white-space: pre-wrap; font-size: .9rem; }
  .cap-empty { color: var(--muted); font-style: italic; }
  .flags { background: #fff8e8; border: 1px solid #ecd9a6; border-radius: 10px; padding: 10px 12px; font-size: .82rem; color: #7a5f1f; margin-top: 6px; }
  .flags b { display: block; margin-bottom: 4px; }
  .needbox { background: #fdf0e2; border: 1px solid #f0cfa2; border-radius: 10px; padding: 12px; font-size: .86rem; color: #7a4f1f; margin-bottom: 14px; }

  /* Review box */
  .reviewbox { border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-top: 18px; background: #fbfaf7; }
  .reviewbox .rev-title { font-weight: 700; color: var(--navy); font-size: .9rem; margin-bottom: 8px; }
  .reviewbox .rev-cur { font-size: .85rem; margin-bottom: 10px; font-weight: 600; }
  .reviewbox .rev-note { font-weight: 400; font-style: italic; color: #555; margin-top: 4px; }
  .reviewbox .rev-field-label { display: block; font-size: .78rem; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
  .reviewbox textarea { width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px; font: inherit; font-size: .85rem; resize: vertical; min-height: 44px; margin-bottom: 10px; }
  .rev-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .rev-actions button { border: 0; border-radius: 9px; padding: 9px 16px; font-size: .86rem; font-weight: 700; cursor: pointer; color: #fff; }
  .btn-approve { background: var(--approve); }
  .btn-change { background: var(--change); }
  .btn-undo { background: #6b7280; }
  .rev-hint { color: var(--muted); font-size: .76rem; margin-top: 8px; }

  footer { text-align: center; color: var(--muted); font-size: .78rem; padding: 26px 20px 40px; }

  /* Password gate */
  .gate { position: fixed; inset: 0; background: var(--navy); display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
  .gate.show { display: flex; }
  .gate-card { background: var(--paper); border-radius: 16px; padding: 32px 28px; width: 100%; max-width: 340px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.35); border-top: 4px solid var(--gold); }
  .gate-brand { font-size: 1.5rem; color: var(--navy); }
  .gate-sub { color: var(--gold-dark); font-size: .74rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 22px; }
  .gate-card input { width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: 10px; font-size: 1rem; margin-bottom: 12px; font-family: inherit; }
  .gate-card button { width: 100%; padding: 12px; background: var(--navy); color: #fff; border: 0; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .gate-card button:hover { background: var(--navy-2); }
  .gate-err { color: #c0392b; font-size: .82rem; margin-top: 12px; }

  /* Drive folder button */
  .drive-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; background: var(--gold); color: #2a2000; font-weight: 700; text-decoration: none; padding: 8px 16px; border-radius: 999px; font-size: .85rem; border: 0; cursor: pointer; }
  .drive-btn:hover { background: #d4b673; }

  @media (max-width: 640px) {
    .cal-cell { min-height: 58px; }
    .card { grid-template-columns: 64px 1fr; }
    .card .card-right { grid-column: 2; flex-direction: row; align-items: center; margin-top: 4px; }
    header.app .brand { font-size: 1.25rem; }
  }
</style>
</head>
<body>
<div id="gate" class="gate">
  <form class="gate-card" id="gateForm">
    <div class="gate-brand serif">Veronica Wilen</div>
    <div class="gate-sub">Content Board</div>
    <input type="password" id="gatePw" placeholder="Enter password" autocomplete="current-password" autofocus />
    <button type="submit">Unlock</button>
    <div class="gate-err" id="gateErr" hidden>Incorrect password. Try again.</div>
  </form>
</div>

<header class="app">
  <div class="wrap">
    <div class="brand serif"><b>Veronica Wilen</b>, Realtor</div>
    <div class="tagline" id="tagline"></div>
    <div class="meta" id="headMeta"></div>
  </div>
</header>

<main>
  <div class="sample-note" id="sampleNote" hidden>
    👀 <b>Sample plan.</b> This is example content so you can see how the board looks and try the
    Approve / Request-change buttons. Real posts appear here once the content system runs.
  </div>

  <section class="needs" id="needsPanel"></section>

  <div class="controls">
    <div class="toggle" role="tablist">
      <button id="tabList" class="active">📋 List</button>
      <button id="tabCal">📅 Calendar</button>
    </div>
    <div class="legend" id="pillarLegend"></div>
  </div>

  <section id="listView"></section>
  <section id="calView" hidden></section>
</main>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<footer id="foot"></footer>

<script>
const SUPA_URL = "https://blqlgjpgdgbqrsqthbym.supabase.co";
const SUPA_KEY = "sb_publishable_lLo3bBOWffNh6U48zewYTQ_jG8MhuLW";
const REVIEW_TABLE = "vw_post_reviews";
const DRIVE_URL = "https://drive.google.com/drive/folders/1Y3iXRf26PWAWQyGIQLJbU2LW5CH7cj58";

const PILLARS = {
  "listings":       { label: "Listing",      desc: "A property she represents (auto-built from the Drive folder)" },
  "market-update":  { label: "Market Update", desc: "Local prices, inventory & trends" },
  "development":    { label: "Development",   desc: "St. Johns County growth & new projects" },
  "community":      { label: "Community",     desc: "Local events & things to do" },
  "lifestyle":      { label: "Lifestyle",     desc: "Neighborhood & area spotlights" },
  "video":          { label: "Video",         desc: "Repurposed from a YouTube video" }
};
const STATUS = {
  "scheduled":   { label: "Scheduled" },
  "proposed":    { label: "Proposed" },
  "needs-input": { label: "Needs input" },
  "posted":      { label: "Posted" },
  "draft":       { label: "Draft" }
};
const PLATFORMS = { facebook: {a:"FB", c:"fb"}, instagram: {a:"IG", c:"ig"}, youtube: {a:"YT", c:"yt"} };
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

const cssVar = (n) => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
const pillarColor = (p) => cssVar("--pillar-" + p) || "#666";
const statusColor = (s) => cssVar("--status-" + s) || "#666";

let PLAN = null;
let REVIEWS = {}; // post_id -> { status, note }

// --- Simple password gate (keeps the board private to Steven + Veronica) ---
// To change the password, ask Claude to update PW_HASH (it's the SHA-256 of the password).
const PW_HASH = "592fbed6f4ef4a643b0c5dec00a9a32f69a4027aedb972265cd9237b7b31d564";
async function sha256(s){ const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''); }
function initGate(){
  if (localStorage.getItem('vw_gate') === PW_HASH) { boot(); return; }
  const gate = document.getElementById('gate');
  gate.classList.add('show');
  document.getElementById('gateForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const h = await sha256(document.getElementById('gatePw').value);
    if (h === PW_HASH) { localStorage.setItem('vw_gate', PW_HASH); gate.classList.remove('show'); boot(); }
    else { document.getElementById('gateErr').hidden = false; }
  });
}
initGate();
async function boot() {
  try {
    PLAN = await fetch("plan.json?v=" + Date.now()).then(r => r.json());
  } catch (err) {
    document.querySelector("main").innerHTML =
      '<div class="sample-note">Could not load plan.json. If you opened this file directly, use the deployed Vercel link instead.</div>';
    return;
  }
  await loadReviews();
  render();
}

async function loadReviews() {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/${REVIEW_TABLE}?select=post_id,status,note`, {
      headers: { apikey: SUPA_KEY, Authorization: "Bearer " + SUPA_KEY }
    });
    if (res.ok) { const rows = await res.json(); REVIEWS = {}; rows.forEach(r => REVIEWS[r.post_id] = r); }
  } catch (e) { /* offline — buttons still render, just no saved state */ }
}

// The reviews table only has one free-text "note" column, so we combine three
// labeled boxes into one tagged string on save, and split it back apart on read.
const NOTE_FIELDS = [
  { key: "photo",   tag: "Photo/video filename", placeholder: "e.g. Nocatee Fall Festival flyer.png" },
  { key: "caption", tag: "Caption changes",       placeholder: "e.g. fix the price to $585,000, softer tone" },
  { key: "other",   tag: "Other notes",           placeholder: "Anything else…" }
];
function composeNote() {
  const parts = [];
  NOTE_FIELDS.forEach(f => {
    const el = document.getElementById("revField_" + f.key);
    const val = el ? el.value.trim() : "";
    if (val) parts.push(`[${f.tag}] ${val}`);
  });
  return parts.join("\n");
}
function parseNote(note) {
  const out = {};
  if (!note) return out;
  const re = /\[([^\]]+)\]\s*([^\[]*)/g;
  let m;
  while ((m = re.exec(note))) {
    const tag = m[1].trim();
    const val = m[2].trim();
    const field = NOTE_FIELDS.find(f => f.tag === tag);
    if (field) out[field.key] = val;
  }
  // Fallback: old freeform notes (pre-dating structured fields) have no [Tag] prefix at all.
  if (!Object.keys(out).length && note.trim()) out.other = note.trim();
  return out;
}

async function submitReview(postId, status) {
  const note = (status === "pending") ? "" : composeNote();
  const actions = document.getElementById("reviewActions");
  if (actions) actions.innerHTML = "Saving…";
  const body = [{ post_id: postId, status, note: note || null, plan_generated_at: PLAN.generatedAt || null, reviewer: "veronica" }];
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/${REVIEW_TABLE}?on_conflict=post_id`, {
      method: "POST",
      headers: {
        apikey: SUPA_KEY, Authorization: "Bearer " + SUPA_KEY,
        "Content-Type": "application/json",
        Prefer: "resolution=merge-duplicates,return=representation"
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    REVIEWS[postId] = { post_id: postId, status, note };
    openPost(postId);
    render();
  } catch (e) {
    if (actions) actions.innerHTML = '<span style="color:#b00;font-weight:600">Could not save. Check your connection and try again.</span>';
  }
}

function reviewInfo(p) {
  // Once a post is scheduled/posted, the review decision is moot — don't show a stale tag.
  if (p.status === "scheduled" || p.status === "posted") return null;
  const r = REVIEWS[p.id];
  if (r && r.status === "approved") return { label: "✓ Approved", color: cssVar("--approve"), bg: "rgba(47,143,106,.14)" };
  if (r && r.status === "change-requested") return { label: "✎ Change requested", color: cssVar("--change"), bg: "rgba(201,130,42,.14)" };
  if (p.status === "proposed" || p.status === "needs-input") return { label: "◷ Awaiting review", color: "#6b7280", bg: "rgba(107,114,128,.12)" };
  return null;
}

function render() {
  const b = PLAN.brand || {};
  document.getElementById("tagline").textContent = b.tagline || "";
  const awaiting = PLAN.posts.filter(p => {
    const r = REVIEWS[p.id];
    return (p.status === "proposed" || p.status === "needs-input") && !(r && r.status === "approved");
  }).length;
  document.getElementById("headMeta").innerHTML = [
    b.brokerage ? `<span>${b.brokerage}</span>` : "",
    PLAN.cadence ? `<span>🗓 <b>${PLAN.cadence}</b></span>` : "",
    PLAN.window && PLAN.window.label ? `<span>Window: <b>${PLAN.window.label}</b></span>` : "",
    awaiting ? `<span class="review-count">${awaiting} awaiting your review</span>` : `<span class="review-count" style="background:#2f8f6a;color:#fff">All reviewed ✓</span>`,
    PLAN.generatedAt ? `<span>Updated ${fmtDate(PLAN.generatedAt)}</span>` : ""
  ].join("");
  document.getElementById("sampleNote").hidden = !PLAN.isSample;

  renderNeeds();
  renderPillarLegend();
  renderCalendar();
  renderList();
  document.getElementById("foot").innerHTML =
    `${b.name || ""} · ${b.phone || ""} · ${b.website || ""}<br>Content board: read, review, and approve. Scheduling happens after your approval.`;
}

function renderNeeds() {
  const el = document.getElementById("needsPanel");
  const needs = PLAN.posts.filter(p => p.status === "needs-input");
  let html = `<h2>📌 Needs from you</h2><div class="sub">Things to drop in the Drive folder so a post can be built. Everything else the system handles.</div>`;
  if (!needs.length) {
    html += `<div class="allclear">✅ Nothing needed right now. The plan is unblocked.</div>`;
  } else {
    html += "<ul>" + needs.map(p =>
      `<li><span class="when">${fmtShort(p.date)}<br><span style="color:var(--muted);font-weight:400">${PILLARS[p.pillar]?.label||p.pillar}</span></span>
        <span class="what">${p.needs || p.hook}</span></li>`
    ).join("") + "</ul>";
  }
  html += `<a class="drive-btn" href="${DRIVE_URL}" target="_blank" rel="noopener">📁 Open the Drive folder to add material</a>`;
  el.innerHTML = html;
}

function renderPillarLegend() {
  document.getElementById("pillarLegend").innerHTML = Object.keys(PILLARS).map(k =>
    `<span title="${PILLARS[k].desc}"><span class="dot" style="background:${pillarColor(k)}"></span>${PILLARS[k].label}</span>`
  ).join("");
}

function postsByDate() {
  const map = {};
  PLAN.posts.forEach(p => { (map[p.date] = map[p.date] || []).push(p); });
  return map;
}

function renderCalendar() {
  const view = document.getElementById("calView");
  const map = postsByDate();
  const dates = PLAN.posts.map(p => p.date).sort();
  const startD = new Date((PLAN.window?.start || dates[0]) + "T12:00:00");
  const endD = new Date((PLAN.window?.end || dates[dates.length-1]) + "T12:00:00");
  const todayStr = new Date().toISOString().slice(0,10);

  let html = "";
  let cur = new Date(startD.getFullYear(), startD.getMonth(), 1);
  const last = new Date(endD.getFullYear(), endD.getMonth(), 1);
  while (cur <= last) {
    const y = cur.getFullYear(), m = cur.getMonth();
    html += `<div class="cal-month"><h3>${MONTHS[m]} ${y}</h3><div class="cal-grid">`;
    ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d => html += `<div class="dow">${d}</div>`);
    const firstDow = new Date(y, m, 1).getDay();
    const daysIn = new Date(y, m+1, 0).getDate();
    for (let i = 0; i < firstDow; i++) html += `<div class="cal-cell empty"></div>`;
    for (let day = 1; day <= daysIn; day++) {
      const ds = `${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
      const isToday = ds === todayStr;
      const chips = (map[ds] || []).map(p => {
        const plats = p.platforms.map(pl => PLATFORMS[pl]?.a).join(" · ");
        const r = (p.status === "scheduled" || p.status === "posted") ? null : REVIEWS[p.id];
        const tick = r && r.status === "approved" ? "✓" : r && r.status === "change-requested" ? "✎" : "";
        return `<button class="chip" style="background:${pillarColor(p.pillar)}" onclick="openPost('${p.id}')">
                  ${tick ? `<span class="rev-tick">${tick}</span>` : ""}${p.hook}<span class="plat">${plats}</span></button>`;
      }).join("");
      html += `<div class="cal-cell${isToday ? " today" : ""}"><div class="num">${day}</div>${chips}</div>`;
    }
    html += `</div></div>`;
    cur.setMonth(cur.getMonth() + 1);
  }
  view.innerHTML = html;
}

function renderList() {
  const view = document.getElementById("listView");
  const posts = [...PLAN.posts].sort((a,b) => a.date.localeCompare(b.date));
  view.innerHTML = `<div class="list">` + posts.map(p => {
    const dt = new Date(p.date + "T12:00:00");
    const plats = p.platforms.map(pl =>
      `<span class="platicon ${PLATFORMS[pl]?.c}">${PLATFORMS[pl]?.a}</span>`).join("");
    const ri = reviewInfo(p);
    return `<div class="card" onclick="openPost('${p.id}')">
      <div class="date"><div class="d">${dt.getDate()}</div><div class="m">${MONTHS[dt.getMonth()].slice(0,3)}</div><div class="t">${p.time||""}</div></div>
      <div class="body">
        <div class="hook">${p.hook}</div>
        <div class="tags">
          <span class="pill" style="background:${pillarColor(p.pillar)}">${PILLARS[p.pillar]?.label||p.pillar}</span>
          <span class="platicons">${plats}</span>
        </div>
        ${p.media?.label ? `<div class="media-note">🎬 ${p.media.label}</div>` : ""}
        ${p.postUrl ? `<div class="media-note">🔗 <a href="${p.postUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">View live post</a></div>` : ""}
      </div>
      <div class="card-right">
        <span class="status" style="background:${hexA(statusColor(p.status),.14)};color:${statusColor(p.status)}">${STATUS[p.status]?.label||p.status}</span>
        ${ri ? `<span class="status" style="background:${ri.bg};color:${ri.color}">${ri.label}</span>` : ""}
      </div>
    </div>`;
  }).join("") + `</div>`;
}

function openPost(id) {
  const p = PLAN.posts.find(x => x.id === id);
  if (!p) return;
  const dt = new Date(p.date + "T12:00:00");

  const capOrder = ["facebook","instagram","youtube"];
  let caps = "";
  capOrder.forEach(pl => {
    if (!p.platforms.includes(pl)) return;
    let val = p.captions ? p.captions[pl] : null;
    // Posted posts only show captions for platforms actually published to — skip empty ones instead of a placeholder.
    if (val == null && p.status === "posted") return;
    const color = pl === "facebook" ? "#1877f2" : pl === "instagram" ? "#d6249f" : "#ff0000";
    let body;
    if (val == null) body = `<span class="cap-empty">Not written yet. See "Needs from you" below.</span>`;
    else if (typeof val === "object") body = escapeHtml(`Title: ${val.title||""}\n\n${val.description||""}`);
    else body = escapeHtml(val);
    caps += `<div class="cap-block"><div class="cap-head" style="background:${color}">${pl}</div><div class="cap-text">${body}</div></div>`;
  });

  // Posted posts are done — show a minimal read-only view (name, media, captions, link).
  if (p.status === "posted") {
    document.getElementById("modal").innerHTML = `
      <div class="m-head">
        <div class="row">
          <div>
            <div style="font-size:.78rem;color:#c9d2e2">${dt.toLocaleDateString('en-US',{weekday:'long'})}, ${MONTHS[dt.getMonth()]} ${dt.getDate()} · ${p.time||""}</div>
            <h3>${escapeHtml(p.hook)}</h3>
          </div>
          <button class="close" onclick="closeModal()">✕</button>
        </div>
      </div>
      <div class="m-body">
        <div class="m-meta">
          <span class="status" style="background:${hexA(statusColor(p.status),.16)};color:${statusColor(p.status)}">${STATUS[p.status]?.label||p.status}</span>
          ${p.platforms.map(pl => `<span class="platicon ${PLATFORMS[pl]?.c}">${PLATFORMS[pl]?.a}</span>`).join(" ")}
        </div>
        ${p.media?.label ? `<div class="media-note" style="margin-bottom:14px;color:var(--muted);font-size:.85rem">🎬 Media: ${escapeHtml(p.media.label)}</div>` : ""}
        ${p.postUrl ? `<div class="media-note" style="margin-bottom:14px;font-size:.85rem">🔗 <a href="${p.postUrl}" target="_blank" rel="noopener">View live post</a></div>` : ""}
        ${caps}
      </div>`;
    document.getElementById("overlay").classList.add("open");
    return;
  }

  const ri = reviewInfo(p);
  const meta = [
    `<span class="pill" style="background:${pillarColor(p.pillar)}">${PILLARS[p.pillar]?.label||p.pillar}</span>`,
    `<span class="status" style="background:${hexA(statusColor(p.status),.16)};color:${statusColor(p.status)}">${STATUS[p.status]?.label||p.status}</span>`,
    ri ? `<span class="status" style="background:${ri.bg};color:${ri.color}">${ri.label}</span>` : "",
    ...p.platforms.map(pl => `<span class="platicon ${PLATFORMS[pl]?.c}">${PLATFORMS[pl]?.a}</span>`)
  ].join(" ");

  const flags = (p.flags && p.flags.length)
    ? `<div class="flags"><b>⚠️ Before posting:</b>${p.flags.map(f=>`• ${escapeHtml(f)}`).join("<br>")}</div>` : "";
  const need = p.needs ? `<div class="needbox"><b>📌 Needs from you:</b> ${escapeHtml(p.needs)}</div>` : "";

  // Review controls — for anything not yet scheduled/posted
  let reviewHtml = "";
  const reviewable = (p.status === "proposed" || p.status === "needs-input");
  const r = REVIEWS[p.id];
  if (reviewable || r) {
    const cur = r && r.status === "approved" ? '<span style="color:var(--approve)">✓ You approved this</span>'
              : r && r.status === "change-requested" ? '<span style="color:var(--change)">✎ You requested a change</span>'
              : '<span style="color:var(--muted)">◷ Awaiting your review</span>';
    const parsed = parseNote(r && r.note);
    const fieldsHtml = NOTE_FIELDS.map(f => `
      <label class="rev-field-label" for="revField_${f.key}">${f.tag}</label>
      <textarea id="revField_${f.key}" placeholder="${escapeHtml(f.placeholder)}">${escapeHtml(parsed[f.key] || "")}</textarea>
    `).join("");
    reviewHtml = `
      <div class="reviewbox">
        <div class="rev-title">Your review</div>
        <div class="rev-cur">${cur}</div>
        ${fieldsHtml}
        <div id="reviewActions" class="rev-actions">
          <button class="btn-approve" onclick="submitReview('${p.id}','approved')">✓ Approve</button>
          <button class="btn-change" onclick="submitReview('${p.id}','change-requested')">✏️ Request change</button>
          ${r ? `<button class="btn-undo" onclick="submitReview('${p.id}','pending')">↩ Undo</button>` : ""}
        </div>
        <div class="rev-hint">You can change your mind anytime: click the other button to switch, or Undo to clear it back to unreviewed. Only approved posts get scheduled.</div>
      </div>`;
  }

  document.getElementById("modal").innerHTML = `
    <div class="m-head">
      <div class="row">
        <div>
          <div style="font-size:.78rem;color:#c9d2e2">${dt.toLocaleDateString('en-US',{weekday:'long'})}, ${MONTHS[dt.getMonth()]} ${dt.getDate()} · ${p.time||""}</div>
          <h3>${escapeHtml(p.hook)}</h3>
        </div>
        <button class="close" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="m-body">
      <div class="m-meta">${meta}</div>
      ${p.media?.label ? `<div class="media-note" style="margin-bottom:14px;color:var(--muted);font-size:.85rem">🎬 Media: ${escapeHtml(p.media.label)}</div>` : ""}
      ${p.postUrl ? `<div class="media-note" style="margin-bottom:14px;font-size:.85rem">🔗 <a href="${p.postUrl}" target="_blank" rel="noopener">View live post</a></div>` : ""}
      ${need}
      ${caps}
      ${flags}
      ${reviewHtml}
    </div>`;
  document.getElementById("overlay").classList.add("open");
}
function closeModal() { document.getElementById("overlay").classList.remove("open"); }
document.getElementById("overlay").addEventListener("click", e => { if (e.target.id === "overlay") closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

document.getElementById("tabCal").addEventListener("click", () => switchView("cal"));
document.getElementById("tabList").addEventListener("click", () => switchView("list"));
function switchView(v) {
  document.getElementById("tabCal").classList.toggle("active", v==="cal");
  document.getElementById("tabList").classList.toggle("active", v==="list");
  document.getElementById("calView").hidden = v!=="cal";
  document.getElementById("listView").hidden = v!=="list";
}

function fmtDate(s){ const d=new Date(s+"T12:00:00"); return `${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}, ${d.getFullYear()}`; }
function fmtShort(s){ const d=new Date(s+"T12:00:00"); return `${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}`; }
function hexA(hex, a){ hex=hex.replace('#',''); if(hex.length===3) hex=hex.split('').map(c=>c+c).join(''); const n=parseInt(hex,16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
